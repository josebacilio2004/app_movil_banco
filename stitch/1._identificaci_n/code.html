<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>MiBCP - Identificación</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "inverse-on-surface": "#f0f0f3",
                "surface-container-high": "#e8e8eb",
                "surface-tint": "#c0000c",
                "on-background": "#1a1c1e",
                "primary": "#b5000b",
                "primary-container": "#e30613",
                "on-primary-fixed-variant": "#930007",
                "primary-fixed-dim": "#ffb4aa",
                "on-primary-container": "#fff5f3",
                "on-tertiary": "#ffffff",
                "tertiary": "#0059a8",
                "error": "#ba1a1a",
                "on-primary": "#ffffff",
                "error-container": "#ffdad6",
                "secondary-fixed-dim": "#a9caef",
                "secondary-fixed": "#cfe4ff",
                "on-surface-variant": "#5e3f3b",
                "on-error": "#ffffff",
                "on-tertiary-container": "#f5f7ff",
                "surface-container-lowest": "#ffffff",
                "inverse-primary": "#ffb4aa",
                "on-tertiary-fixed": "#001b3c",
                "tertiary-fixed-dim": "#a7c8ff",
                "secondary-container": "#b7d8fe",
                "surface-container-low": "#f3f3f6",
                "inverse-surface": "#2f3133",
                "secondary": "#416182",
                "surface-container-highest": "#e2e2e5",
                "on-tertiary-fixed-variant": "#004788",
                "on-secondary": "#ffffff",
                "on-secondary-fixed-variant": "#284969",
                "on-error-container": "#93000a",
                "outline-variant": "#e9bcb6",
                "surface-dim": "#d9dadd",
                "surface": "#f9f9fc",
                "primary-fixed": "#ffdad5",
                "surface-container": "#edeef1",
                "surface-bright": "#f9f9fc",
                "on-secondary-fixed": "#001d34",
                "surface-variant": "#e2e2e5",
                "on-primary-fixed": "#410001",
                "tertiary-fixed": "#d5e3ff",
                "background": "#f9f9fc",
                "on-secondary-container": "#3e5e7f",
                "outline": "#936e69",
                "on-surface": "#1a1c1e",
                "tertiary-container": "#0071d4"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Manrope"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-bcp-gradient { background: linear-gradient(135deg, #b5000b 0%, #e30613 100%); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f9f9fc] dark:bg-slate-950/80 backdrop-blur-md fixed top-0 w-full z-50">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#b5000b] dark:text-[#e30613]" data-icon="arrow_back">arrow_back</span>
</div>
<div class="text-2xl font-bold text-[#b5000b] dark:text-[#e30613] tracking-tighter font-['Manrope']">
                MiBCP
            </div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#416182] dark:text-slate-400" data-icon="help_outline">help_outline</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 pb-12 px-6 max-w-md mx-auto w-full flex flex-col">
<!-- Header Section -->
<section class="mb-10 mt-4">
<h1 class="text-[2.25rem] leading-tight font-headline font-bold text-on-surface tracking-tight mb-2">
                Bienvenido a MiBCP
            </h1>
<p class="text-secondary font-body text-lg opacity-80">
                Ingresa tu número de tarjeta o cuenta
            </p>
</section>
<!-- Form Section -->
<div class="space-y-8">
<!-- Toggle Component -->
<div class="bg-surface-container-low p-1 rounded-xl flex items-center">
<button class="flex-1 py-3 text-sm font-semibold rounded-lg bg-surface-container-lowest text-primary shadow-sm transition-all">
                    Tarjeta
                </button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-secondary opacity-60 hover:opacity-100 transition-all">
                    Cuenta
                </button>
</div>
<!-- Input Component -->
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-widest text-secondary mb-3 ml-1 opacity-70">
                    Número de tarjeta
                </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl py-5 px-6 text-xl font-headline font-semibold text-on-surface focus:ring-2 focus:ring-primary transition-all placeholder:text-on-surface-variant/30" placeholder="**** **** **** 1234" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary/40">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
</div>
</div>
<!-- Action Section -->
<div class="pt-4 space-y-6">
<!-- Disabled-looking Primary Button -->
<button class="w-full bg-primary/40 text-on-primary font-headline font-bold py-5 rounded-full shadow-lg shadow-primary/10 transition-all cursor-not-allowed">
                    Continuar
                </button>
<!-- Secondary Actions -->
<div class="flex flex-col items-center gap-6">
<button class="flex items-center gap-3 text-secondary font-semibold group active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container group-hover:bg-secondary group-hover:text-on-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
</div>
<span class="text-sm">Usar huella digital</span>
</button>
<div class="w-full h-[1px] bg-outline-variant opacity-20"></div>
<a class="text-tertiary font-semibold text-sm hover:underline decoration-2 underline-offset-4" href="#">
                        ¿No tienes tarjeta? Regístrate aquí
                    </a>
</div>
</div>
</div>
<!-- Decorative Security Badge -->
<div class="mt-auto pt-12 flex justify-center">
<div class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[18px] text-secondary/60" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-bold text-secondary/60 uppercase tracking-tighter">Conexión 100% segura</span>
</div>
</div>
</main>
<!-- Bottom Padding for safe area if needed, though shell is hidden for transactional screens -->
<div class="h-6"></div>
<!-- Background Decoration -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-tertiary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
